<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ask Euler · The Geometry of Light</title>
<style>
  :root{ --amber:#e8b64c; --ink:#0a0d14; --panel:#141926; --bubble:#1b2233; --line:#252d3d; --dim:#8b96a8; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100dvh; background:var(--ink); color:#eef2f8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .app{display:flex; flex-direction:column; height:100dvh; max-width:680px; margin:0 auto}
  header{padding:14px 16px calc(12px); border-bottom:1px solid var(--line); background:#0c0f18}
  .brand{display:flex; align-items:center; gap:8px; font-size:11.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--dim)}
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber)}
  h1{font-family:Georgia,serif; font-weight:600; font-size:19px; margin:8px 0 2px}
  .ctx{font-size:12.5px; color:var(--amber)}
  .log{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px}
  .msg{max-width:88%; padding:11px 14px; border-radius:15px; font-size:15px; line-height:1.5; white-space:pre-wrap}
  .me{align-self:flex-end; background:linear-gradient(180deg,#f0c866,#e8b64c); color:#1a1206;
    border-bottom-right-radius:5px}
  .ai{align-self:flex-start; background:var(--bubble); border:1px solid var(--line);
    border-bottom-left-radius:5px}
  .ai.think{color:var(--dim); font-style:italic}
  .starters{display:flex; flex-wrap:wrap; gap:8px; padding:0 16px 8px}
  .chip{border:1px solid var(--line); background:var(--panel); color:#cfd7e4; font-size:13px;
    padding:8px 12px; border-radius:20px; cursor:pointer}
  .chip:active{background:var(--bubble)}
  form{display:flex; gap:9px; padding:10px 12px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line); background:#0c0f18}
  input[type=text]{flex:1; background:var(--panel); border:1px solid var(--line); color:#fff;
    border-radius:22px; padding:12px 15px; font-size:15px; outline:none}
  input[type=text]:focus{border-color:var(--amber)}
  button.send{flex:0 0 auto; width:46px; height:46px; border-radius:50%; border:none;
    background:linear-gradient(180deg,#f0c866,#e8b64c); color:#1a1206; font-size:19px; cursor:pointer}
  button.send:disabled{opacity:.5}
  .notice{margin:0 16px 10px; padding:11px 13px; border:1px solid #5a4a20; background:#211a0c;
    color:#e8c98a; font-size:13px; border-radius:10px}
  a.book{color:var(--amber); text-decoration:none; font-size:12.5px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><span class="dot"></span>Euler · your Fermi AI tutor</div>
    <h1>Ask about this page</h1>
    <div class="ctx" id="ctx">Special Relativity</div>
  </header>
  <div class="notice" id="notice" style="display:none"></div>
  <div class="starters" id="starters"></div>
  <div class="log" id="log"></div>
  <form id="form">
    <input type="text" id="q" placeholder="Ask anything about this topic…" autocomplete="off">
    <button class="send" id="send" type="submit" aria-label="send">↑</button>
  </form>
</div>
<script src="config.js"></script>
<script>
const qs = new URLSearchParams(location.search);
const concept = qs.get('c') || '';
const title = qs.get('title') || '';
const chapter = qs.get('ch') || '';
const ctxLabel = title || chapter || 'Special Relativity';
document.getElementById('ctx').textContent = ctxLabel;

const PROXY = (window.FERMI_PROXY || '').replace(/\/$/,'');
const log = document.getElementById('log');
const history = [];

// concept-aware starter questions
const STARTERS = {
  'sr.light_clock': ["Why does a moving light clock tick slower?", "Where does the √(1−β²) come from?"],
  'sr.time_dilation': ["Is time dilation real or just an illusion?", "Whose clock actually runs slow?"],
  'sr.length_contraction': ["What physically contracts — the object or space?", "Can I feel my own length contract?"],
  'sr.simultaneity': ["How can two events be simultaneous for me but not for you?", "What breaks simultaneity?"],
  'sr.muon_decay': ["How do muons reach the ground if they decay so fast?", "Two frames, same survival — how?"],
  'sr.spacetime_interval': ["Why is the interval the same for everyone?", "What's invariant if time and space aren't?"],
  'sr.light_cone': ["What does the light cone actually forbid?", "Why can't I affect events outside it?"],
  'sr.ladder_paradox': ["Does the ladder fit in the barn or not?", "How do both observers stay right?"],
};
function starters(){
  const s = STARTERS[concept] || ["Give me the intuition for this, not the formula.", "What's the key idea on this page?"];
  const box = document.getElementById('starters');
  s.forEach(q=>{ const b=document.createElement('div'); b.className='chip'; b.textContent=q;
    b.onclick=()=>{ document.getElementById('q').value=q; send(); }; box.appendChild(b); });
}
function bubble(text, who, cls){ const d=document.createElement('div');
  d.className='msg '+(who==='me'?'me':'ai')+(cls?(' '+cls):''); d.textContent=text;
  log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }

async function send(){
  const inp = document.getElementById('q');
  const message = inp.value.trim(); if(!message) return;
  inp.value=''; document.getElementById('starters').innerHTML='';
  bubble(message,'me'); history.push({role:'user',content:message});
  const think = bubble('thinking…','ai','think');
  if(!PROXY){ think.textContent = "The tutor backend isn't connected in this build. (Set the proxy URL in config.js.)"; think.classList.remove('think'); return; }
  document.getElementById('send').disabled=true;
  try{
    const r = await fetch(PROXY+'/chat', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ concept: title||concept, chapter, history: history.slice(0,-1), message }) });
    const d = await r.json();
    const reply = d.reply || ('(error: '+(d.error||'no reply')+')');
    think.textContent = reply; think.classList.remove('think');
    history.push({role:'assistant',content:reply});
  }catch(e){ think.textContent = 'Could not reach the tutor ('+e.message+').'; think.classList.remove('think'); }
  document.getElementById('send').disabled=false;
}
document.getElementById('form').onsubmit = e=>{ e.preventDefault(); send(); };
if(!PROXY){ const n=document.getElementById('notice'); n.style.display='block';
  n.textContent = "Demo note: connect the tutor proxy URL in config.js to make answers live."; }
starters();
bubble("Hi — I'm Euler, your tutor for "+ctxLabel+". Ask me why it works, not just what the formula says.", 'ai');
</script>
</body>
</html>
