<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Derivation · The Geometry of Light</title>
<style>
  :root{ --amber:#e8b64c; --ink:#0a0d14; --panel:#11151f; --line:#232a38; --dim:#8b96a8; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:var(--ink); color:#eef2f8; min-height:100dvh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:660px; margin:0 auto; padding:16px 16px calc(28px + env(safe-area-inset-bottom))}
  .brand{display:flex; align-items:center; gap:8px; font-size:12px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--dim)}
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .kicker{font-size:12.5px; color:var(--amber); letter-spacing:.03em; text-transform:uppercase; margin-top:12px}
  h1{font-family:Georgia,serif; font-weight:600; font-size:23px; line-height:1.2; margin:3px 0 2px}
  video{width:100%; border:1px solid var(--line); border-radius:14px; margin:16px 0 8px; background:#060810; display:block}
  .controls{display:flex; gap:10px}
  button.replay{flex:0 0 auto; border:1px solid var(--line); background:var(--panel); color:#cfd7e4;
    border-radius:11px; padding:11px 16px; font-size:14px; cursor:pointer}
  h2{font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:24px 0 8px}
  ol{margin:0; padding-left:22px}
  ol li{margin:0 0 10px; font-size:15px; line-height:1.5; color:#c7cede}
  .row{display:flex; gap:10px; margin-top:22px}
  a.btn{flex:1; text-align:center; text-decoration:none; padding:13px 12px; border-radius:11px; font-size:14.5px; font-weight:600}
  a.tutor{background:linear-gradient(180deg,#f0c866,#e8b64c); color:#1a1206}
  a.back{background:var(--panel); border:1px solid var(--line); color:#cfd7e4}
  .foot{margin-top:26px; text-align:center; color:#5c6678; font-size:11.5px; letter-spacing:.08em}
  .err{color:#ff9a8b; font-size:14px; padding:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span>Fermi&nbsp;Books · Derivation, step by step</div>
  <div class="kicker" id="kicker">Special Relativity</div>
  <h1 id="title">Loading…</h1>
  <video id="vid" controls autoplay muted loop playsinline></video>
  <div class="controls"><button class="replay" id="replay">↻ Replay from the top</button></div>
  <h2>What each step does</h2>
  <ol id="steps"></ol>
  <div class="row">
    <a class="btn tutor" id="tutorlink" href="#">Ask Euler</a>
    <a class="btn back" id="backlink" href="./">Back to the book</a>
  </div>
  <div class="foot">FERMI AI · THE GEOMETRY OF LIGHT · SCAN &amp; UNDERSTAND</div>
</div>
<script>
const id = new URLSearchParams(location.search).get('id') || '';
const vid = document.getElementById('vid');
vid.src = 'vid/'+id+'.mp4';
vid.poster = 'vid/'+id+'.jpg';
document.getElementById('replay').onclick = ()=>{ vid.currentTime=0; vid.play(); };
fetch('derivations_meta.json').then(r=>r.json()).then(meta=>{
  const d = meta[id];
  if(!d){ document.getElementById('title').textContent='Derivation'; return; }
  document.getElementById('title').textContent = d.title;
  const ol = document.getElementById('steps');
  (d.notes||[]).forEach(n=>{ const li=document.createElement('li'); li.textContent=n; ol.appendChild(li); });
  document.getElementById('tutorlink').href = 'tutor.html?c='+encodeURIComponent(d.concept||'')+'&title='+encodeURIComponent(d.title||'');
}).catch(()=>{ document.getElementById('title').textContent='Derivation'; });
</script>
</body>
</html>
