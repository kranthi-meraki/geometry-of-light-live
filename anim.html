<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Live Figure · The Geometry of Light</title>
<style>
  :root{ --amber:#e8b64c; --ink:#0a0d14; --panel:#11151f; --line:#232a38; --dim:#8b96a8; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:var(--ink); color:#eef2f8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100dvh}
  .wrap{max-width:640px; margin:0 auto; padding:16px 16px calc(24px + env(safe-area-inset-bottom))}
  .brand{display:flex; align-items:center; gap:8px; font-size:12px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--dim)}
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);
    box-shadow:0 0 8px var(--amber)}
  h1{font-family:Georgia,"Times New Roman",serif; font-weight:600; font-size:22px;
    line-height:1.2; margin:14px 0 2px}
  .kicker{font-size:12.5px; color:var(--amber); letter-spacing:.03em; text-transform:uppercase}
  .stage{margin:16px 0 10px; border:1px solid var(--line); border-radius:14px; overflow:hidden;
    background:#060810; position:relative; aspect-ratio:1/1}
  canvas{display:block; width:100%; height:100%}
  .loading{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--dim); font-size:14px}
  .controls{display:flex; align-items:center; gap:12px; margin:4px 0 2px}
  button.play{flex:0 0 auto; width:46px; height:46px; border-radius:50%; border:1px solid var(--line);
    background:var(--panel); color:#fff; font-size:17px; cursor:pointer}
  button.play:active{transform:scale(.94)}
  input[type=range]{flex:1; accent-color:var(--amber); height:26px}
  .caption{color:#c7cede; font-size:15px; line-height:1.5; margin:12px 2px 0}
  .row{display:flex; gap:10px; margin-top:20px}
  a.btn{flex:1; text-align:center; text-decoration:none; padding:13px 12px; border-radius:11px;
    font-size:14.5px; font-weight:600}
  a.tutor{background:linear-gradient(180deg,#f0c866,#e8b64c); color:#1a1206;}
  a.back{background:var(--panel); border:1px solid var(--line); color:#cfd7e4}
  .err{color:#ff9a8b; font-size:13px; padding:10px; font-family:ui-monospace,monospace}
  .foot{margin-top:26px; text-align:center; color:#5c6678; font-size:11.5px; letter-spacing:.08em}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span>Fermi&nbsp;Books · Living Figure</div>
  <div class="kicker" id="kicker">Special Relativity</div>
  <h1 id="title">Loading…</h1>
  <div class="stage"><canvas id="c"></canvas><div class="loading" id="load">rendering the physics…</div></div>
  <div class="controls">
    <button class="play" id="play" aria-label="play/pause">❚❚</button>
    <input type="range" id="scrub" min="0" max="1000" value="0">
  </div>
  <div class="caption" id="cap"></div>
  <div class="row">
    <a class="btn tutor" id="tutorlink" href="#">Ask Euler</a>
    <a class="btn back" id="backlink" href="./">Back to the book</a>
  </div>
  <div class="foot">FERMI AI · THE GEOMETRY OF LIGHT · SCAN &amp; UNDERSTAND</div>
</div>
<script>
const qs = new URLSearchParams(location.search);
const id = qs.get('id') || '';
const concept = qs.get('c') || '';
const title = qs.get('title') || 'Live figure';
const cap = qs.get('cap') || '';
document.getElementById('title').textContent = title;
document.getElementById('cap').textContent = cap;
document.getElementById('tutorlink').href = 'tutor.html?c=' + encodeURIComponent(concept) + '&title=' + encodeURIComponent(title);

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let anim=null, state=null, ok=false, playing=true, manualT=null, start=null, duration=6000, W=0,H=0;

function size(){
  const dpr = Math.min(window.devicePixelRatio||1, 2.5);
  const r = cvs.getBoundingClientRect();
  W = Math.round(r.width); H = Math.round(r.height);
  cvs.width = Math.round(W*dpr); cvs.height = Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(ok && anim.setup){ try{ state = anim.setup(W,H); }catch(e){} }
}
function fail(msg){ document.getElementById('load').innerHTML =
  '<div class="err">This figure could not load.<br>'+(msg||'')+'</div>'; }

fetch('anims/'+id+'.js').then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
 .then(code=>{
    try{ anim = eval('('+code+')'); }catch(e){ return fail('eval: '+e.message); }
    if(!anim || typeof anim.frame!=='function') return fail('bad animation object');
    ok = true; duration = (anim.duration||6)*1000;
    document.getElementById('load').style.display='none';
    size();
    requestAnimationFrame(tick);
 }).catch(e=> fail(e.message));

function draw(t){ try{ anim.frame(ctx, t, W, H, state); }catch(e){ ok=false; fail('frame: '+e.message); } }
function tick(ts){
  if(!ok) return;
  if(manualT!=null){ draw(manualT); }
  else if(playing){
    if(start==null) start=ts;
    const t = ((ts-start)%duration)/duration;
    draw(t);
    document.getElementById('scrub').value = Math.round(t*1000);
  }
  requestAnimationFrame(tick);
}
window.addEventListener('resize', ()=>{ if(ok) size(); });
document.getElementById('play').onclick = function(){
  if(manualT!=null){ manualT=null; start=null; playing=true; this.textContent='❚❚'; return; }
  playing=!playing; this.textContent = playing?'❚❚':'▶';
  if(playing) start=null;
};
document.getElementById('scrub').oninput = function(e){
  manualT = (+e.target.value)/1000; playing=false;
  document.getElementById('play').textContent='▶';
};
</script>
</body>
</html>
